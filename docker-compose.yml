services:
  db:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: idf-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interior_design
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: idf-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/interior_design
      - PORT=3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: idf-frontend
    ports:
      - "18080:80"
    depends_on:
      - backend

volumes:
  pgdata:
