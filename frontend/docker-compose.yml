version: "3.8"

services:
  interior-design-flow:
    build:
      context: .
      dockerfile: Dockerfile
    image: interior-design-flow:v1.0.2
    container_name: interior-design-flow
    ports:
      - "18080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
